version: 1
env:
  variables:
    PRISMA_CLIENT_ENGINE_TYPE: binary
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - echo "Verifying Prisma files..."
        - ls -la generated/prisma/ || echo "Warning: generated/prisma not found"
  artifacts:
    baseDirectory: .
    files:
      - '.next/**/*'
      - 'generated/**/*'
      - 'node_modules/.prisma/**/*'
      - 'node_modules/@prisma/**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
      - generated/prisma/**/*




